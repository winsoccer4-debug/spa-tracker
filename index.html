<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>

<title>Spa Commission Tracker</title>

  .header-title{color:#fff;font-size:18px;font-weight:700;margin-top:2px;}
  .header-badge{background:rgba(200,184,154,.15);border-radius:12px;padding:6px 12px;text-align:right;}
  .header-badge .val{color:#fff;font-size:18px;font-weight:700;}
  .header-badge .lbl{color:#c8b89a;font-size:10px;}

  /* RATE BAR */

  .rate-label{color:#c8b89a;font-size:11px;white-space:nowrap;}
  .rate-input{background:rgba(255,255,255,0.15);border:1px solid rgba(200,184,154,0.4);border-radius:6px;color:#fff;padding:4px 8px;font-size:13px;width:80px;outline:none;font-family:inherit;text-align:center;}
  .rate-result{color:#fff;font-size:11px;margin-left:auto;white-space:nowrap;}

  .date-row{display:flex;gap:8px;margin-bottom:10px;}
  .date-input{flex:1;background:rgba(255,255,255,.1);border:1px solid rgba(200,184,154,.3);border-radius:8px;color:#fff;padding:7px 10px;font-size:13px;outline:none;font-family:inherit;}
  .btn-today{background:#c8b89a;color:#1a3028;border:none;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;}
  .btn-today.inactive{background:rgba(200,184,154,.2);color:#c8b89a;}
  .tabs{display:flex;gap:6px;}
  .tab{flex:1;padding:7px 4px;font-size:12px;border:none;border-radius:8px;cursor:pointer;font-family:inherit;transition:all .2s;}
  .tab.active{background:#c8b89a;color:#1a3028;font-weight:700;}
  .tab.inactive{background:rgba(255,255,255,.08);color:#c8b89a;}

  .toast{position:fixed;top:180px;left:50%;transform:translateX(-50%);background:#2d4a3e;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3);white-space:nowrap;display:none;}
  .content{padding:16px;}
  .summary-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
  .summary-meta{font-size:12px;color:#888;margin-bottom:10px;}
  .summary-grid{display:flex;gap:10px;}
  .summary-box{flex:1;text-align:center;border-radius:10px;padding:10px;}
  .summary-box .val{font-size:18px;font-weight:800;}
  .summary-box .val2{font-size:11px;font-weight:600;margin-top:2px;}
  .summary-box .lbl{font-size:10px;margin-top:2px;}
  .box-green{background:#f0f7f4;}.box-green .val{color:#2d4a3e;}.box-green .val2{color:#52796f;}.box-green .lbl{color:#888;}
  .box-purple{background:#f7f0f5;}.box-purple .val{color:#7b4f8e;}.box-purple .val2{color:#9c7aac;}.box-purple .lbl{color:#888;}

  .section-title{font-size:12px;font-weight:700;color:#2d4a3e;margin-bottom:8px;padding-left:4px;}
  .entry{background:#fff;border-radius:12px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
  .entry-num{width:26px;height:26px;border-radius:7px;background:#2d4a3e;color:#c8b89a;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
  .entry-info{flex:1;min-width:0;}
  .entry-name{font-size:12px;font-weight:600;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .entry-sub{font-size:10px;color:#888;}
  .entry-com{text-align:right;flex-shrink:0;}
  .entry-com .eur{font-size:14px;font-weight:800;color:#2d6a4f;}
  .entry-com .thb{font-size:10px;color:#888;}
  .entry-del{background:none;border:none;color:#ccc;font-size:20px;cursor:pointer;padding:2px 4px;flex-shrink:0;line-height:1;}
  .btn-add{width:100%;padding:14px;background:linear-gradient(135deg,#2d4a3e,#1a3028);color:#c8b89a;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(45,74,62,.3);display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;}

  .hist-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);cursor:pointer;}
  .hist-top{display:flex;justify-content:space-between;align-items:flex-start;}
  .hist-date{font-size:14px;font-weight:700;color:#222;}
  .hist-meta{font-size:11px;color:#888;margin-top:2px;}
  .hist-com{text-align:right;}
  .hist-com .eur{font-size:18px;font-weight:800;color:#2d4a3e;}
  .hist-com .thb{font-size:11px;color:#888;}
  .hist-tags{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px;}
  .hist-tag{background:#f0f7f4;color:#2d4a3e;font-size:10px;padding:2px 8px;border-radius:20px;}

  .month-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .month-box{border-radius:14px;padding:14px;text-align:center;}
  .month-box .val{font-size:20px;font-weight:800;}
  .month-box .val2{font-size:11px;font-weight:600;margin-top:2px;}
  .month-box .lbl{font-size:11px;color:#888;margin-top:2px;}
  .bg-green{background:#f0f7f4;}.bg-green .val{color:#2d4a3e;}.bg-green .val2{color:#52796f;}
  .bg-purple{background:#f7f0f5;}.bg-purple .val{color:#7b4f8e;}
  .bg-blue{background:#eef4fb;}.bg-blue .val{color:#1b6ca8;}
  .bg-warm{background:#fdf5f0;}.bg-warm .val{color:#b07d62;}.bg-warm .val2{color:#c49070;}

  .day-row{display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:10px;padding:10px 14px;margin-bottom:6px;box-shadow:0 1px 4px rgba(0,0,0,.05);}
  .day-left .name{font-size:13px;font-weight:600;}
  .day-left .sub{font-size:11px;color:#888;}
  .day-right{text-align:right;}
  .day-right .eur{font-size:14px;font-weight:800;color:#2d4a3e;}
  .day-right .thb{font-size:10px;color:#888;}

  .empty{text-align:center;color:#aaa;padding:40px;font-size:13px;line-height:2;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;flex-direction:column;justify-content:flex-end;}
  .modal{background:#f7f3ee;border-radius:20px 20px 0 0;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.2);}
  .modal-header{padding:14px 14px 8px;border-bottom:1px solid #e8e2d9;position:sticky;top:0;background:#f7f3ee;border-radius:20px 20px 0 0;z-index:10;}
  .modal-title-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .modal-title{font-size:15px;font-weight:700;color:#1a3028;}
  .btn-close{background:#e8e2d9;border:none;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;color:#555;}
  .search-input{width:100%;padding:8px 12px;font-size:13px;border:1px solid #ddd;border-radius:10px;background:#fff;outline:none;font-family:inherit;margin-bottom:8px;}
  .cat-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;}
  .cat-scroll::-webkit-scrollbar{display:none;}
  .cat-btn{white-space:nowrap;padding:4px 10px;font-size:11px;border-radius:20px;cursor:pointer;flex-shrink:0;font-family:inherit;border:1px solid #ddd;background:#fff;color:#555;}

  .modal-list{overflow-y:auto;padding:6px 12px 24px;}
  .cat-label{font-size:11px;font-weight:700;padding:8px 4px 4px;letter-spacing:.5px;text-transform:uppercase;}

  .massage-time{font-size:11px;color:#888;margin-top:1px;}
  .massage-com{text-align:right;flex-shrink:0;}
  .massage-com .eur{color:#fff;border-radius:8px;padding:3px 8px;font-size:12px;font-weight:700;display:block;}
  .massage-com .thb{font-size:10px;color:#888;display:block;margin-top:2px;text-align:right;}

</head>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-label">Spa Commission</div>
      <div class="header-title">บันทึกค่าคอม</div>
    </div>
    <div class="header-badge">
      <div class="lbl">วันนี้</div>
      <div class="val" id="hdr-today">€0.0</div>
      <div class="lbl" id="hdr-today-thb">฿0</div>
    </div>
  </div>

  <!-- อัตราแลกเปลี่ยน -->
  <div class="rate-bar">
    <span class="rate-label">€1 =</span>
    <input class="rate-input" type="number" id="rate-input" value="38" min="1" step="0.5" oninput="onRateChange()"/>
    <span class="rate-label">บาท</span>
    <span class="rate-result" id="rate-display">อัตราปัจจุบัน: 38 ฿/€</span>
  </div>

  <div class="date-row">
    <input type="date" class="date-input" id="date-input"/>
    <button class="btn-today" id="btn-today" onclick="goToday()">วันนี้</button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('today',this)">📋 บันทึก</button>
    <button class="tab inactive" onclick="switchTab('history',this)">📅 ประวัติ</button>
    <button class="tab inactive" onclick="switchTab('summary',this)">📊 สรุป</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="content" id="view-today">
  <div class="summary-card">
    <div class="summary-meta" id="day-meta">—</div>
    <div class="summary-grid">
      <div class="summary-box box-green">
        <div class="val" id="day-total-eur">€0.0</div>
        <div class="val2" id="day-total-thb">฿0</div>
        <div class="lbl">ค่าคอมวันนี้</div>
      </div>
      <div class="summary-box box-purple">
        <div class="val" id="month-total-eur">€0.0</div>
        <div class="val2" id="month-total-thb">฿0</div>
        <div class="lbl">รวมเดือนนี้</div>
      </div>
    </div>
  </div>
  <div id="entries-container"></div>
  <button class="btn-add" onclick="openPicker()"><span style="font-size:20px">+</span> เพิ่มรายการนวด</button>
</div>

<div class="content" id="view-history" style="display:none">
  <div class="section-title">ประวัติทั้งหมด</div>
  <div id="history-container"></div>
</div>

<div class="content" id="view-summary" style="display:none">
  <div class="section-title" id="month-label">สรุปเดือน</div>
  <div class="month-grid">
    <div class="month-box bg-green"><div class="val" id="s-eur">€0</div><div class="val2" id="s-thb">฿0</div><div class="lbl">ค่าคอมรวม</div></div>
    <div class="month-box bg-purple"><div class="val" id="s-sessions">0</div><div class="lbl">จำนวนครั้ง</div></div>
    <div class="month-box bg-blue"><div class="val" id="s-days">0</div><div class="lbl">วันที่ทำงาน</div></div>
    <div class="month-box bg-warm"><div class="val" id="s-avg-eur">€0</div><div class="val2" id="s-avg-thb">฿0</div><div class="lbl">เฉลี่ย/วัน</div></div>
  </div>
  <div class="section-title">รายวัน</div>
  <div id="summary-days"></div>
</div>

<div class="modal-overlay" id="modal" style="display:none" onclick="closePickerOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title-row">
        <div class="modal-title">เลือกรายการนวด</div>
        <button class="btn-close" onclick="closePicker()">×</button>
      </div>
      <input class="search-input" id="search-input" placeholder="🔍 ค้นหารายการ..." oninput="renderPicker()"/>
      <div class="cat-scroll" id="cat-scroll"></div>
    </div>
    <div class="modal-list" id="modal-list"></div>
  </div>
</div>

const CAT_COLORS={"นวดพื้นฐาน":"#2d6a4f","นวดเฉพาะส่วน":"#52796f","ทรีทเม้นท์ผิว":"#b5838d","ริทชวล & โปรแกรม":"#6d4c41","สำหรับคู่ (2 therapists)":"#7b4f8e","Marine Therapy":"#1b6ca8","คุณแม่ตั้งครรภ์":"#b07d62"};
const CATS=[...new Set(MASSAGE_LIST.map(m=>m.cat))];

let records={};
let currentDate=todayStr();
let selectedCat="ทั้งหมด";
let currentTab="today";
let rate=38;

function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtDate(d){const[y,m,day]=d.split("-");return`${day}/${m}/${y}`;}
function monthKey(d){return d.slice(0,7);}
function toThb(eur){return Math.round(eur*rate);}
function fmtThb(eur){return"฿"+toThb(eur).toLocaleString();}
function fmtEur(eur){return"€"+eur.toFixed(2);}

function load(){try{records=JSON.parse(localStorage.getItem("spa_v3")||"{}");}catch(e){records={};}}
function save(){localStorage.setItem("spa_v3",JSON.stringify(records));}
function loadRate(){const r=parseFloat(localStorage.getItem("spa_rate"));if(r&&r>0){rate=r;document.getElementById("rate-input").value=r;}}
function saveRate(){localStorage.setItem("spa_rate",rate);}

function onRateChange(){
  const v=parseFloat(document.getElementById("rate-input").value);
  if(v>0){rate=v;saveRate();}
  document.getElementById("rate-display").textContent="อัตราปัจจุบัน: "+rate+" ฿/€";
  renderAll();
}

load();loadRate();
document.getElementById("rate-display").textContent="อัตราปัจจุบัน: "+rate+" ฿/€";
document.getElementById("date-input").value=currentDate;
document.getElementById("date-input").addEventListener("change",function(){currentDate=this.value;updateTodayBtn();renderAll();});
buildCatButtons();
renderAll();

function updateTodayBtn(){document.getElementById("btn-today").className=currentDate===todayStr()?"btn-today":"btn-today inactive";}
function goToday(){currentDate=todayStr();document.getElementById("date-input").value=currentDate;updateTodayBtn();renderAll();}

function switchTab(tab,el){
  currentTab=tab;
  document.querySelectorAll(".tab").forEach(t=>t.className="tab inactive");
  el.className="tab active";
  document.getElementById("view-today").style.display=tab==="today"?"block":"none";
  document.getElementById("view-history").style.display=tab==="history"?"block":"none";
  document.getElementById("view-summary").style.display=tab==="summary"?"block":"none";
  renderAll();
}

function renderAll(){
  const entries=records[currentDate]||[];
  const dayEur=entries.reduce((s,e)=>s+e.com,0);
  const dayHours=entries.reduce((s,e)=>s+e.time,0);
  const mk=monthKey(currentDate);
  const monthDays=Object.keys(records).filter(d=>d.startsWith(mk));
  const monthEur=monthDays.reduce((s,d)=>s+(records[d]||[]).reduce((ss,e)=>ss+e.com,0),0);

  document.getElementById("hdr-today").textContent=fmtEur(dayEur);
  document.getElementById("hdr-today-thb").textContent=fmtThb(dayEur);

  if(currentTab==="today"){
    document.getElementById("day-meta").textContent=`${fmtDate(currentDate)} — ${entries.length} รายการ | ${dayHours.toFixed(1)} ชม.`;
    document.getElementById("day-total-eur").textContent=fmtEur(dayEur);
    document.getElementById("day-total-thb").textContent=fmtThb(dayEur);
    document.getElementById("month-total-eur").textContent=fmtEur(monthEur);
    document.getElementById("month-total-thb").textContent=fmtThb(monthEur);
    renderEntries(entries);
  }
  if(currentTab==="history")renderHistory();
  if(currentTab==="summary")renderSummary();
}

function renderEntries(entries){
  const c=document.getElementById("entries-container");
  if(!entries.length){c.innerHTML="";return;}
  let html=`<div class="section-title">รายการวันนี้</div>`;
  entries.forEach((e,i)=>{
    html+=`<div class="entry">
      <div class="entry-num">${i+1}</div>
      <div class="entry-info"><div class="entry-name">${e.name}</div><div class="entry-sub">${e.time}h · ${e.at}</div></div>
      <div class="entry-com"><div class="eur">${fmtEur(e.com)}</div><div class="thb">${fmtThb(e.com)}</div></div>
      <button class="entry-del" onclick="removeEntry('${currentDate}',${e.id})">×</button>
    </div>`;
  });
  c.innerHTML=html;
}

function renderHistory(){
  const c=document.getElementById("history-container");
  const allDates=Object.keys(records).filter(d=>(records[d]||[]).length>0).sort().reverse();
  if(!allDates.length){c.innerHTML=`<div class="empty">ยังไม่มีข้อมูล<br/>เริ่มบันทึกได้เลย!</div>`;return;}
  let html="";
  allDates.forEach(date=>{
    const entries=records[date]||[];
    const total=entries.reduce((s,e)=>s+e.com,0);
    const hours=entries.reduce((s,e)=>s+e.time,0);
    const tags=entries.slice(0,4).map(e=>`<span class="hist-tag">${e.name.split(" ").slice(0,3).join(" ")}</span>`).join("");
    const more=entries.length>4?`<span style="font-size:10px;color:#888">+${entries.length-4}</span>`:"";
    html+=`<div class="hist-card" onclick="jumpToDate('${date}')">
      <div class="hist-top">
        <div><div class="hist-date">${fmtDate(date)}</div><div class="hist-meta">${entries.length} รายการ · ${hours.toFixed(1)} ชม.</div></div>
        <div class="hist-com"><div class="eur">${fmtEur(total)}</div><div class="thb">${fmtThb(total)}</div></div>
      </div>
      <div class="hist-tags">${tags}${more}</div>
    </div>`;
  });
  c.innerHTML=html;
}

function jumpToDate(date){
  currentDate=date;document.getElementById("date-input").value=date;updateTodayBtn();
  document.querySelectorAll(".tab").forEach(t=>t.className="tab inactive");
  document.querySelectorAll(".tab")[0].className="tab active";
  currentTab="today";
  document.getElementById("view-today").style.display="block";
  document.getElementById("view-history").style.display="none";
  document.getElementById("view-summary").style.display="none";
  renderAll();
}

function renderSummary(){
  const mk=monthKey(currentDate);
  const[y,m]=mk.split("-");
  document.getElementById("month-label").textContent=`สรุปเดือน ${m}/${y}`;
  const monthDays=Object.keys(records).filter(d=>d.startsWith(mk)&&(records[d]||[]).length>0);
  const monthEur=monthDays.reduce((s,d)=>s+(records[d]||[]).reduce((ss,e)=>ss+e.com,0),0);
  const monthSessions=monthDays.reduce((s,d)=>s+(records[d]||[]).length,0);
  const avg=monthDays.length?monthEur/monthDays.length:0;
  document.getElementById("s-eur").textContent=fmtEur(monthEur);
  document.getElementById("s-thb").textContent=fmtThb(monthEur);
  document.getElementById("s-sessions").textContent=monthSessions;
  document.getElementById("s-days").textContent=monthDays.length;
  document.getElementById("s-avg-eur").textContent=fmtEur(avg);
  document.getElementById("s-avg-thb").textContent=fmtThb(avg);
  let html="";
  monthDays.sort().reverse().forEach(date=>{
    const entries=records[date]||[];
    const total=entries.reduce((s,e)=>s+e.com,0);
    html+=`<div class="day-row">
      <div class="day-left"><div class="name">${fmtDate(date)}</div><div class="sub">${entries.length} รายการ</div></div>
      <div class="day-right"><div class="eur">${fmtEur(total)}</div><div class="thb">${fmtThb(total)}</div></div>
    </div>`;
  });
  document.getElementById("summary-days").innerHTML=html||`<div class="empty">ยังไม่มีข้อมูลเดือนนี้</div>`;
}

function addMassage(m){
  const entry={id:Date.now(),massageId:m.id,name:m.name,time:m.time,com:m.com,at:new Date().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"})};
  if(!records[currentDate])records[currentDate]=[];
  records[currentDate].push(entry);
  save();showToast("✓ เพิ่ม "+m.name);closePicker();renderAll();
}

function removeEntry(date,id){
  records[date]=(records[date]||[]).filter(e=>e.id!==id);
  save();renderAll();
}

function buildCatButtons(){
  const scroll=document.getElementById("cat-scroll");
  let html=`<button class="cat-btn active" onclick="setCat('ทั้งหมด',this)">ทั้งหมด</button>`;
  CATS.forEach(c=>{html+=`<button class="cat-btn" onclick="setCat('${c}',this)">${c.split(" ")[0]}</button>`;});
  scroll.innerHTML=html;
}
function setCat(cat,el){selectedCat=cat;document.querySelectorAll(".cat-btn").forEach(b=>b.className="cat-btn");el.className="cat-btn active";renderPicker();}
function openPicker(){document.getElementById("modal").style.display="flex";document.getElementById("search-input").value="";selectedCat="ทั้งหมด";document.querySelectorAll(".cat-btn").forEach((b,i)=>{b.className=i===0?"cat-btn active":"cat-btn";});renderPicker();}
function closePicker(){document.getElementById("modal").style.display="none";}
function closePickerOutside(e){if(e.target.id==="modal")closePicker();}

function renderPicker(){
  const q=document.getElementById("search-input").value.toLowerCase();
  const filtered=MASSAGE_LIST.filter(m=>(selectedCat==="ทั้งหมด"||m.cat===selectedCat)&&m.name.toLowerCase().includes(q));
  const grouped={};
  CATS.forEach(c=>{const items=filtered.filter(m=>m.cat===c);if(items.length)grouped[c]=items;});
  let html="";
  Object.entries(grouped).forEach(([cat,items])=>{
    const color=CAT_COLORS[cat]||"#555";
    html+=`<div class="cat-label" style="color:${color}">${cat}</div>`;
    items.forEach(m=>{
      html+=`<button class="massage-btn" onclick='addMassage(MASSAGE_LIST.find(x=>x.id===${m.id}))'>
        <div><div class="massage-name">${m.name}</div><div class="massage-time">${m.time}h</div></div>
        <div class="massage-com">
          <span class="eur" style="background:${color}">${fmtEur(m.com)}</span>
          <span class="thb">${fmtThb(m.com)}</span>
        </div>
      </button>`;
    });
  });
  if(!html)html=`<div class="empty">ไม่พบรายการที่ค้นหา</div>`;
  document.getElementById("modal-list").innerHTML=html;
}

function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.style.display="block";clearTimeout(window._toastTimer);window._toastTimer=setTimeout(()=>{t.style.display="none";},2000);}
</script>
